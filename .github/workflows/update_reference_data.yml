name: Monthly Reference Data Refresh

# Keeps the cap-proxy universe ranking's share anchor from silently drifting.
# shares_outstanding.csv (market_cap / price per ticker) is the anchor
# src/data/universe.py multiplies by historical prices to rank the point-in-
# time top-N; its own module docstring documents a bounded ~1-3%/yr drift
# from buybacks/issuance if it goes stale. The daily cron never touched this
# file, so without a scheduled refresh it would only ever update if someone
# remembered to run scripts/update_shares_outstanding.py by hand.
#
# sp500_membership.csv is deliberately NOT auto-refreshed here: it's vendored
# from a third-party GitHub source (see data/reference/README.md) and a
# format/content change should get human review before being committed, not
# an unattended overwrite. Re-vendor it manually per that README's cadence.

on:
  schedule:
    # 06:00 UTC on the 1st of each month.
    - cron: "0 6 1 * *"
  workflow_dispatch: # Allow manual triggers

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Refresh shares-outstanding anchor
        run: uv run python scripts/update_shares_outstanding.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/reference/shares_outstanding.csv
          if git diff --cached --quiet; then
            echo "No shares-outstanding changes to commit."
          else
            git commit -m "chore: refresh shares-outstanding anchor $(date -u +%Y-%m-%d)"
            git push
          fi
