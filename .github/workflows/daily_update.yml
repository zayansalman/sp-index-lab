name: Daily Data Update

on:
  schedule:
    # 6:30 PM ET = 22:30 UTC, weekdays only
    - cron: "30 22 * * 1-5"
  workflow_dispatch: # Allow manual triggers

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Restore market data cache
        uses: actions/cache@v4
        with:
          path: data/*.parquet
          key: market-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            market-data-${{ runner.os }}-

      - name: Run daily update
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: uv run python scripts/daily_update.py

      - name: Recompute strategy backtests
        run: uv run python scripts/run_alpha_backtest.py

      - name: Export frontend JSON
        run: uv run python scripts/export_frontend_data.py

      - name: Commit and push updated frontend data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/*.json
          if git diff --cached --quiet; then
            echo "No frontend data changes to commit."
          else
            git commit -m "chore: daily data update $(date -u +%Y-%m-%d)"
            git push
          fi
